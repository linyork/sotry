version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: sotry-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./.docker/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    image: node:20-alpine
    container_name: sotry-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/app
      - ./.docker/backend_nm:/app/node_modules
      - db_data:/data
    environment:
      - NODE_ENV=development
      - OLLAMA_BASE_URL=http://ollama:11434
      - DB_PATH=/data/sotry.db
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: sotry-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - ./.docker/frontend_nm:/app/node_modules
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

  db-ui:
    image: coleifer/sqlite-web:latest
    container_name: sotry-db-ui
    volumes:
      - db_data:/data
    command: ["sqlite_web", "--host", "0.0.0.0", "--port", "8080", "--url-prefix", "/db", "/data/sotry.db"]
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: sotry-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - db-ui
    restart: unless-stopped

volumes:
  db_data:
