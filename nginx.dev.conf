server {
    listen 80;

    # sqlite-web DB UI
    location /db {
        proxy_pass http://db-ui:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (Vite dev server) — handles HMR WebSocket and SSE via Vite's own proxy
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE (AI streaming) to reach the browser without buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
